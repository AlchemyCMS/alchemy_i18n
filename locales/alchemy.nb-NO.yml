        published:
          name: Publisert
        restricted:
          name: Begrenset
        updated_at_lteq:
          name: Oppdatert før
        updated_at_gteq:
          name: Oppdatert etter
      picture:
        by_file_format:
          all: Vis alle filtyper
          name: Filtype
          values:
            <<: *mime_types
            gif: "GIF-bilde"
            jpeg: "JPG-bilde"
            png: "PNG-bilde"
            svg: "SVG-bilde"
            tiff: "TIFF-bilde"
            webp: "WebP-bilde"
        last_upload:
          name: Kun siste opplasting
        recent:
          name: Kun nylig opplastet
        without_tag:
          name: Uten tag
        deletable:
          name: Ikke i bruk
      attachment:
        by_file_type:
          all: Vis alle filtyper
          name: Filtype
          values:
            <<: *mime_types
        last_upload:
          name: Kun siste opplasting
        recent:
          name: Kun nylig opplastet
        without_tag:
          name: Uten tag
        deletable:
          name: Ikke i bruk

