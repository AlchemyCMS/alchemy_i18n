# encoding: UTF-8

nb-NO:
  # = Alchemy Translations
  # All translations used in Alchemy CMS are inside this alchemy namespace.
  alchemy:
    # == Translations for menu names
    # Just use the menu name like defined inside the config/alchemy/menus.yml file and translate it.
    # We're providing main and footer menu here as a convenience.
    # Example:
    #
    # de:
    #   alchemy:
    #     menu_names:
    #       sidebar_menu: Sidemeny
    #
    menu_names:
      main_menu: Hovedmeny
      footer_menu: Bunntekstmeny

    # == Translations for page_layout names
    # Just use the page_layouts name like defined inside the config/alchemy/page_layouts.yml file and translate it.
    #
    # Example:
    #
    # nb-NO:
    #   alchemy:
    #     page_layout_names:
    #       contact: Kontakt
    #       search: Søk
    #
    page_layout_names:

    # == Translations for element names
    # Just use the elements name like defined inside the config/alchemy/elements.yml file and translate it.
    #
    # Example:
    #
    # nb-NO:
    #   alchemy:
    #     element_names:
    #       article: Artikkel
    #       contactform: Kontaktskjema
    #
    element_names:

    # == Translated roles for ingredients in elements.
    # Used for the ingredient editor label inside the element editor view (The elements window)
    #
    # Tip: You can translate ingredient roles globally for all ingredients with this role, or specificly for an element.
    # To do so, just place the ingredient_role under the element name
    #
    # Example:
    #
    # nb-NO:
    #  alchemy:
    #    ingredient_roles:
    #      headline: Overskrift
    #      news_article:
    #        headline: Nyhetsoverskrift
    #      image_caption: Bildetekst
    #      show_caption: Vis bildetekst
    #
    ingredient_roles:

    # === Translations for ingredient validations
    # Used when a user did not enter (correct) values to the ingredient field.
    #
    # Tip: You can define the validation messages translations different for each element and ingredient
    #
    # Example:
    #
    # nb-NO:
    #   alchemy:
    #     ingredient_validations:
    #       contactform:
    #         success_page:
    #           blank: 'Vennligst velg en oppfølgingsside.'
    #         mail_to:
    #           blank: 'Vennligst oppgi en e-postadresse.'
    #
    ingredient_validations:
      errors:
        blank: "%{field} kan ikke være blankt"
        invalid: "%{field} har feil format"
        taken: "%{field} er allerede i bruk"

    default_ingredient_texts:
      lorem: "Lorem ipsum dolor sit amet, consectetur adipisicing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum."
      corporate_lorem: "Appropriately enable sustainable growth strategies vis-a-vis holistic materials. Energistically orchestrate open-source e-tailers vis-a-vis plug-and-play best practices. Uniquely plagiarize client-centric opportunities whereas plug-and-play ideas. Distinctively reconceptualize backward-compatible partnerships vis-a-vis reliable total linkage. Interactively fabricate highly efficient networks for clicks-and-mortar content. Collaboratively reconceptualize holistic markets via 2.0 architectures."

    picture_ingredients:
      css_classes:
        left: "Venstre for tekst"
        right: "Høyre for tekst"
        no_float: "Over tekst"

    ingredient_values:
      boolean:
        "true": "Sant"
        "false": "Usant"

    # == Contactform translations
    contactform:
      labels:
        salutation: "Tiltaleform"
        choose: "Vennligst velg"
        mr: "Hr."
        mrs: "Fr."
        firstname: "Fornavn"
        lastname: "Etternavn"
        address: "Gateadresse"
        zip: "Postnummer/sted"
        phone: "Telefonnummer"
        email: "E-post"
        message: "Beskjed"
        send: "Send"
        mandatory_fields: "*Obligatoriske felt."
      # The flash message shown after successfully sending the message.
      messages:
        success: "Din beskjed ble levert."

    # == Translated language names for translation select
    translations:
      de: "DE"
      en: "EN"
      es: "ES"
      it: "IT"
      fr: "FR"
      nl: "NL"
      ru: "RU"

    # == User roles translations
    user_roles:
      registered: "Registrert"
      member: "Medlem"
      author: "Forfatter"
      editor: "Redaktør"
      admin: "Administrator"

    # == Mime Types translations
    # These are human readable mime types used for the document-type row in archive files.
    mime_types: &mime_types
