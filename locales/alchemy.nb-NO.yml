    # === Translations for filter names and values
    # Used in the right filter column in case the model has `alchemy_resource_filters` defined.
    #
    filters:
      page:
        by_page_layout:
          all: Alle sidetyper
          name: Sidetype
        status:
          all: Ikke filtrer
          name: Status
          values:
            not_public: Upublisert
            published: Publisert
            restricted: Begrenset
