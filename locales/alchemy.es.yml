# encoding: UTF-8

es:
  # = Alchemy Translations
  # All translations used in Alchemy CMS are inside this alchemy namespace.
  alchemy:
    # == Translations for menu names
    # Just use the menu name like defined inside the config/alchemy/menus.yml file and translate it.
    # We're providing main and footer menu here as a convenience.
    # Example:
    #
    # de:
    #   alchemy:
    #     menu_names:
    #       sidebar_menu: Menú de barra lateral
    #
    menu_names:
      main_menu: Menú principal
      footer_menu: Menú de pie de página

    # == Translations for page_layout names
    # Just use the page_layouts name like defined inside the config/alchemy/page_layouts.yml file and translate it.
    #
    # Example:
    #
    # es:
    #   alchemy:
    #     page_layout_names:
    #       contact: Contacto
    #       search: Buscar
    #
    page_layout_names:
      index: Inicio

    # == Translations for element names
    # Just use the elements name like defined inside the config/alchemy/elements.yml file and translate it.
    #
    # Example:
    #
    # es:
    #   alchemy:
    #     element_names:
    #       article: Article
    #       contactform: Contact form
    #
    element_names:
      article: Artículo

    # == Translated roles for ingredients in elements.
    # Used for the ingredient editor label inside the element editor view (The elements window)
    #
    # Tip: You can translate ingredient roles globally for all ingredients with this role, or specificly for an element.
    # To do so, just place the ingredient_role under the element name
    #
    # Example:
    #
    # es:
    #  alchemy:
    #    ingredient_roles:
    #      headline: Titular
    #      news_article:
    #        headline: Titular de noticia
    #      image_caption: Subtítulo
    #      show_caption: Subtítulo de programa
    #
    ingredient_roles:
      headline: Encabezado
      text: Texto
      picture: Imagen

    # === Translations for ingredient validations
    # Used when a user did not enter (correct) values to the ingredient field.
    #
    # Tip: You can define the validation messages translations different for each element and ingredient
    #
    # Example:
    #
    # es:
    #   alchemy:
    #     ingredient_validations:
    #       contactform:
    #         success_page:
    #           blank: 'Por favor elige una página para mostrar.'
    #         mail_to:
    #           blank: 'Por favor proporciona una dirección de correo donde entregar las consultas de contacto.'
    #
    ingredient_validations:
      errors:
        blank: "%{field} no puede estar en blanco"
        invalid: "%{field} tiene un formato incorrecto "
        taken: "%{field} ya está en uso"

    # Hint texts for ingredients
    ingredient_hints:
      headline: "Esta es una sencilla línea de texto sin formato"
      picture: "Las imágenes se almacenan en la librería. Puede asignar una imagen varias veces en su sitio. Alchemy tiene una herramienta de recorte de imagen integrada."
      text: "Este es un bloque de texto enriquecido mediante el editor TinyMCE. Puede cambiar la configuración del editor. Ver https://guides.alchemy-cms.com/how_to_customize_tinymce"

    # Default texts for new ingredients created
    default_ingredient_texts:
      article_headline: "Bienvenido a su primera página de Alchemy CMS"
      article_text: |
        <p><strong>Cómo empezar.</strong></p>
        <p>Lo primero de todo debería leer sobre Alchemy y su arquitectura en las <a class="external" href="https://guides.alchemy-cms.com/about" target="_blank" data-link-target="blank">guías</a>.</p>
        <p>Las cosas más importantes que debe saber sobre Alchemy son elementos (<i>elements</i>) y disposiciones de página (<i>page layouts</i>).</p><p><span style="text-decoration: underline;"><strong>Elementos:</strong></span></p>
        <p>Con Alchemy puede dividir las páginas en partes de contenido, elementos. Estos elementos se pueden definir mediante varios tipos de contenido básicos: ingredientes (<i>ingredients</i>). Las esencias básicas son:</p>
        <ul>
          <li>Text - <em>Una única línea de texto</em></li>
          <li>Richtext - <em>Un bloque de texto formateado mediante TinyMCE</em></li>
          <li>Picture - <em>Una referencia a una imagen</em></li>
          <li>Html - <em>Código HTML empotrado</em></li>
          <li>Select - <em>Una selección de valores</em></li>
          <li>Boolean - <em>Una casilla de verificación</em></li>
        </ul>
        <p>Los elementos se definen en el fichero YAML <strong>config/alchemy/elements.yml</strong></p>
        <p><a class="external" href="https://guides.alchemy-cms.com/elements" target="_blank" data-link-target="blank">Lea más sobre elementos y cómo definirlos en las guías.</a></p>
        <p><span style="text-decoration: underline;"><strong>Tipos de página:</strong></span></p>
        <p>Puede definir varios tipos de páginas, llamados disposiciones de páginas (<i>page layouts</i>). Puede asignar elementos a las disposiciones de páginas y controlar cómo se comportan los elementos y una página con una disposición concreta.</p>
        <p>Las disposiciones de páginas se definen en el fichero YAML <strong>config/alchemy/page_layouts.yml</strong></p>
        <p><a class="external" href="https://guides.alchemy-cms.com/pages" target="_blank" data-link-target="blank">Lea más sobre definir disposiciones de páginas en las guías.</a></p>
      lorem: "Lorem ipsum dolor sit amet, consectetur adipisicing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum."
      corporate_lorem: "Appropriately enable sustainable growth strategies vis-a-vis holistic materials. Energistically orchestrate open-source e-tailers vis-a-vis plug-and-play best practices. Uniquely plagiarize client-centric opportunities whereas plug-and-play ideas. Distinctively reconceptualize backward-compatible partnerships vis-a-vis reliable total linkage. Interactively fabricate highly efficient networks for clicks-and-mortar content. Collaboratively reconceptualize holistic markets via 2.0 architectures."

